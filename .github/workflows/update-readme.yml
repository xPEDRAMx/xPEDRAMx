name: Update README Metrics

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/update-readme.yml"
      - ".github/scripts/update-github-activity.mjs"
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Opt into Node.js 24 for JS-based actions (Node 20 deprecated on runners).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: readme-metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-activity:
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Update README with recent activity
        run: node .github/scripts/update-github-activity.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}

  # Run after activity so both jobs don't push competing README commits (non-fast-forward failures).
  update-waka-stats:
    needs: update-activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # GH_TOKEN: classic PAT with repo + user (see EXAMPLE-HOW_TO.md). Falls back to GITHUB_TOKEN if unset.
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"
          SHOW_PROJECTS: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_TIMEZONE: "False"
          # Hides "This Week I Spent My Time On" (needs any of timezone/lang/editors/projects/os on)
          SHOW_LANGUAGE: "False"
          SHOW_EDITORS: "False"
          SHOW_OS: "False"
